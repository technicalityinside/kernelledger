services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     garuda
      POSTGRES_PASSWORD: garuda
      POSTGRES_DB:       garuda
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U garuda"]
      interval: 5s
      timeout:  5s
      retries:  10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://garuda:garuda@db:5432/garuda
      PUSH_API_KEY: ${PUSH_API_KEY:?PUSH_API_KEY must be set}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
